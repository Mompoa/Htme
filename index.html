
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Website</title>

    <!-- Mobile friendly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        footer {
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            background: #e5e7eb;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome sa Website Ko</h1>
        <p>Ginawa gamit ang HTML at GitHub Pages 🚀</p>
    </header>

    <section>
        <div class="card">
            <h2>👋 About Me</h2>
            <p>
                Hi! Ako ay nag-aaral ng web development.
                Ito ang una kong website na naka-host sa GitHub Pages.
            </p>
        </div>

        <div class="card">
            <h2>📚 Mga Natutunan Ko</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>GitHub Pages</li>
            </ul>
        </div>

        <div class="card">
            <h2>🔘 Button Example</h2>
            <button onclick="alert('Hello! Gumagana ang JavaScript 😄')">
                I-click Ako
            </button>
        </div>
    </section>

    <footer>
        © 2026 My First Website | Powered by GitHub Pages
    </footer>

</body>
  </html>
