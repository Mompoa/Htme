<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My ChatGPT (OpenRouter)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

#chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.message {
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 8px;
    max-width: 80%;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

footer {
    display: flex;
    padding: 10px;
    background: #020617;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    margin-left: 8px;
    padding: 10px 15px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🤖 My ChatGPT (OpenRouter)</header>

<div id="chat"></div>

<footer>
    <input id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
</footer>

<script>
const API_KEY = "PUT_YOUR_OPENROUTER_API_KEY_HERE";
const MODEL = "openai/gpt-3.5-turbo";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const userText = input.value.trim();
    if (!userText) return;

    addMessage(userText, "user");
    input.value = "";

    addMessage("Typing...", "bot");

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY,
            "HTTP-Referer": "https://yourgithubusername.github.io",
            "X-Title": "My ChatGPT"
        },
        body: JSON.stringify({
            model: MODEL,
            messages: [
                { role: "user", content: userText }
            ]
        })
    });

    chat.removeChild(chat.lastChild);

    const data = await response.json();
    const reply = data.choices[0].message.content;

    addMessage(reply, "bot");
}
</script>

</body>
</html>
